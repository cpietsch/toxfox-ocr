raw_ingredients_list: 'Posologie et mode d''administrat. BIEN AGITER AVANT USAGE.
  Excipients à effet notoire: parahydroxybenzoate de mèthyle et propyle. Ce produit
  ne contient pas de sucre ni de gluten. hent ministre. ine Adultes et enfant de plus
  de 12 ans: 5 à 10 ml après les repas et au coucher GAVISCON ADVANCE Indications
  thèrapeutiques: Traitement symptomatique du reflux gastro-oesophagien tels que regurgitations
  acides, pyrosis, digestion difficile secondaire au reflux Chaque dose de 10ml (2
  cuillères - du contenu stomacal comme, par exemple, après chirurgie gastrique, lors
  d;une hernie hiatale, au cours de la grossesse ou lors d''une oesophagite, incluant
  les symptômes laryngo-pharyngiens du reflux tels que enrouement et autres troubles
  de la voix, maux de gorge et toux. Peut aussi être utilisé en concomitance ou après
  l''arrét des antisécrétoires gastriques pour traiter les symptômes de refiux gastro-oesophagien.
  Mises en garde et précautions d''emploi: mesure) contient 106 de sodium (4,6 mmol)
  et 78mg (2,0 mmol) de potassium. Ces teneurs doivent être prises en compte en cas
  de régime sans sel strict, par exemple, lors de certaines insuffisances cardiaques
  congestives ou de dysfonctionnement renal, ou lors de la prise de medicaments pouvant
  augmenter les taux plasmatiques de potassium. mg nts. tion Compostion: Chaque ml
  de suspension buvable eur, contient 100 mg d''alginate de sodium et 20 mg de bicarbonate
  de potassium qui agissent en tant que principes actifs. Les autres excipients sont
  le carbonate de calcium, carbomère, hydrogénocarbonate de méthyle et propyle. Saccharine
  sodique, hydroxide de sodium, arôme anis et eau purifèe. 30350'
